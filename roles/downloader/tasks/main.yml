---
- name: Select binary
  ansible.builtin.include_tasks: tasks/select_binary.yml

- name: Download, extract, move and cleanup
  block:
    - name: Create base download directory on localhost (once)
      ansible.builtin.tempfile:
        state: directory
        prefix: downloader.
      register: downloader_tmp_base
      delegate_to: localhost
      become: false
      run_once: true

    - name: Create architecture-specific subdirectory on localhost
      ansible.builtin.file:
        path: "{{ downloader_tmp_base.path }}/{{ ansible_system | lower }}_{{ ansible_architecture }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: false

    - name: Set temporary directory path fact
      ansible.builtin.set_fact:
        downloader_tmp_dir: "{{ downloader_tmp_base.path }}/{{ ansible_system | lower }}_{{ ansible_architecture }}"
        downloader_base_tmp_dir: "{{ downloader_tmp_base.path }}"

    - name: Debug temp directory paths
      ansible.builtin.debug:
        msg: "Base temp dir: {{ downloader_base_tmp_dir }}, arch-specific dir: {{ downloader_tmp_dir }}"
      when: downloader_debug | default(false)

    - name: Check if binary already downloaded on localhost
      ansible.builtin.stat:
        path: "{{ downloader_tmp_dir }}/{{ downloader_result_url | basename }}"
      register: downloader_binary_exists
      delegate_to: localhost
      become: false

    - name: Debug binary cache status
      ansible.builtin.debug:
        msg: >-
          {{ downloader_result_url | basename }}:
          {{ 'already cached, skipping download' if downloader_binary_exists.stat.exists else 'not cached, will download' }}
      when: downloader_debug | default(false)

    - name: Prepare checksum for verification
      ansible.builtin.include_tasks: tasks/prepare_checksum.yml
      when: not downloader_binary_exists.stat.exists

    - name: Download the file to localhost (skips if exists)
      ansible.builtin.get_url:
        url: "{{ downloader_result_url }}"
        dest: "{{ downloader_tmp_dir }}/{{ downloader_result_url | basename }}"
        mode: '0640'
        checksum: "{{ downloader_checksum | default(omit) }}"
      register: downloader_dl_result_raw
      delegate_to: localhost
      become: false
      when: not downloader_binary_exists.stat.exists
      throttle: 1

    - name: Set download result path
      ansible.builtin.set_fact:
        downloader_dl_result:
          dest: "{{ downloader_tmp_dir }}/{{ downloader_result_url | basename }}"

    - name: Debug download result
      ansible.builtin.debug:
        msg: "Downloaded to: {{ downloader_dl_result.dest }}"
      when: downloader_debug | default(false)

    - name: Handle archive
      ansible.builtin.include_tasks: tasks/handle_archive.yml
      when: downloader_result_url is match(downloader_archive_regex)

    - name: Handle single binary
      ansible.builtin.include_tasks: tasks/handle_binary.yml
      when: downloader_result_url is not match(downloader_archive_regex)

  always:
    - name: Delete base download directory on localhost (once)
      ansible.builtin.file:
        path: "{{ downloader_base_tmp_dir }}"
        state: absent
      delegate_to: localhost
      become: false
      run_once: true
