---
# This task file may be included multiple times when deploying to hosts with
# different architectures. All checksum variables are explicitly reset here to
# prevent values from one architecture's run leaking into the next.
- name: Clear all checksum-related variables from previous iterations
  ansible.builtin.set_fact:
    downloader_checksum: ""
    downloader_checksum_content: ""
    downloader_checksum_lines: []
    downloader_checksum_line: ""
    downloader_hash: ""

- name: Check if checksum file already downloaded
  ansible.builtin.stat:
    path: "{{ downloader_tmp_dir }}/CHECKSUMS"
  register: downloader_checksum_exists
  when: downloader_checksum_url | length > 0
  delegate_to: localhost
  become: false

- name: Download checksum file to localhost
  ansible.builtin.get_url:
    url: "{{ downloader_checksum_url }}"
    dest: "{{ downloader_tmp_dir }}/CHECKSUMS"
    mode: '0600'
  register: downloader_checksum_dl
  when:
    - downloader_checksum_url | length > 0
    - not downloader_checksum_exists.stat.exists
  delegate_to: localhost
  become: false
  throttle: 1

- name: Set checksum_dl for skipped hosts
  ansible.builtin.set_fact:
    downloader_checksum_dl:
      skipped: false
  when:
    - downloader_checksum_url | length > 0
    - downloader_checksum_exists.stat.exists

- name: Read checksum file from localhost
  ansible.builtin.slurp:
    src: "{{ downloader_tmp_dir }}/CHECKSUMS"
  register: downloader_checksum_content
  when:
    - downloader_checksum_url | length > 0
    - downloader_checksum_exists.stat.exists or (downloader_checksum_dl is succeeded and downloader_checksum_dl is not skipped)
  delegate_to: localhost
  become: false

- name: Extract binary filename from download URL
  ansible.builtin.set_fact:
    downloader_bin_filename: "{{ downloader_result_url | basename }}"

- name: Debug binary filename
  ansible.builtin.debug:
    msg: "Looking for checksum for: {{ downloader_bin_filename }}"
  when:
    - downloader_debug | default(false)
    - downloader_checksum_url | length > 0

- name: Split checksum file into lines
  ansible.builtin.set_fact:
    downloader_checksum_lines: "{{ (downloader_checksum_content.content | b64decode).split('\n') }}"
  when: downloader_checksum_content is defined and downloader_checksum_content.content is defined

- name: Find matching checksum line
  ansible.builtin.set_fact:
    downloader_checksum_line: "{{ downloader_checksum_lines | select('search', downloader_bin_filename) | list | first | default('') }}"
  when: downloader_checksum_lines is defined

- name: Debug matched line
  ansible.builtin.debug:
    msg: "Matched line: {{ downloader_checksum_line }}"
  when:
    - downloader_debug | default(false)
    - downloader_checksum_line is defined

- name: Extract hash from matching line
  # Assumes standard SHA256SUMS format: "<hash>  <filename>"
  # Extracts the first whitespace-delimited field as the hash.
  # Reversed formats ("<filename> <hash>") used by some projects will not work.
  ansible.builtin.set_fact:
    downloader_hash: "{{ downloader_checksum_line.split() | first | default('') }}"
  when: downloader_checksum_line is defined and downloader_checksum_line | length > 0

- name: Set checksum for download verification
  ansible.builtin.set_fact:
    downloader_checksum: "sha256:{{ downloader_hash }}"
  when: downloader_hash is defined and downloader_hash | length > 0

- name: Show checksum that will be used
  ansible.builtin.debug:
    msg: "Will verify download with: {{ downloader_checksum | default('no checksum - skipping verification') }}"
  when: downloader_debug | default(false)

- name: Warn if no checksum found
  ansible.builtin.debug:
    msg: "WARNING: No checksum file found for {{ downloader_project }}. Download will not be verified."
  when: downloader_checksum_url | length == 0 or downloader_hash is not defined or downloader_hash | length == 0
