---
- name: Gather facts for localhost if not already collected
  ansible.builtin.setup:
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  become: false
  when: hostvars['localhost'].ansible_os_family is not defined

- name: Check if extraction marker exists
  ansible.builtin.stat:
    path: "{{ downloader_tmp_dir }}/.extracted"
  register: downloader_extract_marker
  delegate_to: localhost
  become: false

- name: Debug archive extraction tool
  ansible.builtin.debug:
    msg: "Extracting {{ downloader_dl_result.dest | basename }} using {{ 'gtar' if hostvars['localhost'].ansible_os_family == 'Darwin' else 'tar' }}"
  when: downloader_debug | default(false)

- name: Extract file on localhost (using gtar on macOS)
  ansible.builtin.unarchive:
    src: "{{ downloader_dl_result.dest }}"
    dest: "{{ downloader_tmp_dir }}"
    remote_src: true
  environment:
    TAR: "{{ 'gtar' if hostvars['localhost'].ansible_os_family == 'Darwin' else 'tar' }}"
  when:
    - downloader_result_url is not search('(?<!tar)\.bz2$')
    - not downloader_extract_marker.stat.exists
  delegate_to: localhost
  become: false
  throttle: 1

- name: Create extraction marker
  ansible.builtin.file:
    path: "{{ downloader_tmp_dir }}/.extracted"
    state: touch
    mode: '0644'
  delegate_to: localhost
  become: false
  when:
    - downloader_result_url is not search('(?<!tar)\.bz2$')
    - not downloader_extract_marker.stat.exists

- name: Extract plain bz2 file on localhost
  ansible.builtin.command:
    cmd: bunzip2 -k "{{ downloader_dl_result.dest }}"
    creates: "{{ downloader_dl_result.dest | regex_replace('\\.bz2$', '') }}"
  when:
    - downloader_result_url is search('(?<!tar)\.bz2$')
    - not downloader_extract_marker.stat.exists
  delegate_to: localhost
  become: false
  throttle: 1

- name: Create extraction marker for bz2
  ansible.builtin.file:
    path: "{{ downloader_tmp_dir }}/.extracted"
    state: touch
    mode: '0644'
  delegate_to: localhost
  become: false
  when:
    - downloader_result_url is search('(?<!tar)\.bz2$')
    - not downloader_extract_marker.stat.exists

- name: Find executable files in extracted directory on localhost
  ansible.builtin.find:
    paths: "{{ downloader_tmp_dir }}"
    recurse: true
    file_type: file
  register: downloader_found_files
  delegate_to: localhost
  become: false

- name: Debug all files found in extracted directory
  ansible.builtin.debug:
    msg: "All files in extracted archive: {{ downloader_found_files.files | map(attribute='path') | list }}"
  when: downloader_debug | default(false)

- name: Filter only executable files
  ansible.builtin.set_fact:
    downloader_exec_files: >-
      {{ downloader_found_files.files | selectattr('mode', 'search', '.*[157]$') | map(attribute='path') | list }}
  when: downloader_result_url is not search('(?<!tar)\.bz2$')

- name: Filter the previously bzipped file
  ansible.builtin.set_fact:
    downloader_exec_files: ["{{ downloader_tmp_dir ~ '/' ~ downloader_result_url | basename | regex_replace('\\.bz2$', '') }}"]
  when: downloader_result_url is search('(?<!tar)\.bz2$')

- name: Fail if no executable files found in archive
  ansible.builtin.fail:
    msg: >-
      No executable files found in archive {{ downloader_dl_result.dest | basename }}.
      Check that the archive contains a binary with executable permissions,
      or set downloader_debug: true to inspect the extracted contents.
  when: downloader_exec_files | length == 0

- name: Debug found executable files
  ansible.builtin.debug:
    msg: "Found executable files: {{ downloader_exec_files }}"
  when: downloader_debug | default(false)


- name: Copy file from localhost to {{ downloader_install_dir }}
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ downloader_install_dir }}/{{ downloader_binary_name | default(downloader_project) }}"
    owner: "{{ downloader_binary_owner }}"
    group: "{{ downloader_binary_group }}"
    mode: '0755'
  loop:
    "{{ downloader_exec_files }}"
